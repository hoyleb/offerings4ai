services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 12

  migrate:
    image: ${API_IMAGE}
    restart: 'no'
    command: ['python', '-m', 'app.migrations.cli', 'upgrade']
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: ${API_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8899
      PORT: 8899
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import os, urllib.request; from urllib.parse import urlparse; base = os.environ.get(\"PUBLIC_SITE_URL\") or os.environ.get(\"PUBLIC_API_BASE_URL\") or \"http://127.0.0.1\"; host = urlparse(base).hostname or \"127.0.0.1\"; req = urllib.request.Request(\"http://127.0.0.1:8899/health\", headers={\"Host\": host, \"X-Forwarded-Proto\": \"https\"}); urllib.request.urlopen(req)"',
        ]
      interval: 15s
      timeout: 30s
      start_period: 30s
      retries: 12

  worker:
    image: ${WORKER_IMAGE}
    restart: unless-stopped
    command: ['python', '-m', 'app.worker']
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'python -c "from redis import Redis; import os; Redis.from_url(os.environ[\"REDIS_URL\"]).ping()"']
      interval: 15s
      timeout: 30s
      start_period: 30s
      retries: 12

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      PORT: 5188
      RUNTIME_API_BASE_URL: ${RUNTIME_API_BASE_URL:-}
      RUNTIME_SITE_URL: ${RUNTIME_SITE_URL:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:5188 >/dev/null 2>&1']
      interval: 15s
      timeout: 15s
      start_period: 20s
      retries: 12

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
