services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-offering4ai}
      POSTGRES_USER: ${POSTGRES_USER:-offering4ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-offering4ai}
    ports:
      - "5544:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-offering4ai} -d ${POSTGRES_DB:-offering4ai}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: ./backend
    command: ["python", "-m", "app.migrations.cli", "upgrade"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://offering4ai:offering4ai@postgres:5432/offering4ai}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://offering4ai:offering4ai@postgres:5432/offering4ai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QUEUE_MODE: ${QUEUE_MODE:-redis}
      APP_HOST: 0.0.0.0
      APP_PORT: 8899
      PORT: 8899
    ports:
      - "8899:8899"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8899/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://offering4ai:offering4ai@postgres:5432/offering4ai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QUEUE_MODE: ${QUEUE_MODE:-redis}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from redis import Redis; import os; Redis.from_url(os.environ['REDIS_URL']).ping()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      PORT: 5188
    ports:
      - "5188:5188"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:5188 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
